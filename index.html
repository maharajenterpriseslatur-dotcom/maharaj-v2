<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maharaj JSON Generator v5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 p-6 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
        <h1 class="text-2xl font-black mb-2 text-cyan-700">JSON Data Generator</h1>
        <p class="text-slate-500 text-sm mb-8">Tracks totals and includes a robust fallback copy feature.</p>
        
        <div class="grid grid-cols-1 gap-6 mb-8">
            <div class="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center hover:border-cyan-500 transition-all cursor-pointer bg-slate-50" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
                <span class="text-3xl block mb-2">📊</span>
                <p class="font-bold text-slate-600" id="fileLabel">Upload Excel File</p>
            </div>
            
            <button id="convertBtn" class="bg-cyan-600 hover:bg-cyan-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-cyan-100">
                GENERATE JSON
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-cyan-50 border border-cyan-100 p-4 rounded-2xl">
                <p class="text-[10px] font-black uppercase tracking-widest text-cyan-600">Total Companies</p>
                <p id="companyCount" class="text-2xl font-black text-cyan-900">0</p>
            </div>
            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl">
                <p class="text-[10px] font-black uppercase tracking-widest text-indigo-600">Total Products</p>
                <p id="productCount" class="text-2xl font-black text-indigo-900">0</p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Output JSON</h2>
                <button id="copyBtn" class="text-[10px] bg-slate-900 text-white px-4 py-2 rounded-full font-bold hover:bg-black active:scale-95 transition-transform">COPY JSON</button>
            </div>
            <pre id="output" class="bg-slate-900 text-cyan-400 p-6 rounded-2xl text-[11px] overflow-auto max-h-[600px] border border-slate-800 shadow-inner">JSON will appear here...</pre>
        </div>
    </div>

    <script>
        const LOGO_MAP = {
            "AJANTA PHARMA LIMITED": "ajanta.jpg",
            "CANIXA LIFE SCIENCES": "canixa.jpg",
            "CIPLA": "cipla.svg",
            "DR. REDDY": "dotorreddy.png",
            "ERIS THERAPEUTICS LIMITED": "eris.png",
            "GLENMARK PHARMACEUTIUCALS LTD.": "glenmark.png",
            "GLOWDERMA LAB PVT. LTD.": "glowderma.jpg",
            "HIMALAYA": "himalaya.png",
            "INTAS PHARMACEUTICALS LTD": "intas.png",
            "MICRO LABS LIMITED": "microlabs.png",
            "PIRAMAL": "piramal.png",
            "SUNWAY PVT.LTD": "sunway.png",
            "TORRENT PHARMA": "torrrent.png",
            "UBIK SOLUTIONS PVT. LTD.": "ubik.png"
        };

        const REPO_BASE = "https://raw.githubusercontent.com/maharajenterpriseslatur-dotcom/maharaj-v2/main/";

        document.getElementById('fileInput').onchange = (e) => {
            if (e.target.files.length > 0) document.getElementById('fileLabel').innerText = e.target.files[0].name;
        };

        document.getElementById('convertBtn').onclick = () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Please select a file!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rawRows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                processData(rawRows);
            };
            reader.readAsArrayBuffer(file);
        };

        function processData(rows) {
            const products = [];
            let currentCompany = null;
            let idCounter = 1;
            let totalProducts = 0;

            rows.forEach((row) => {
                const activeCells = row
                    .map(cell => String(cell).trim())
                    .filter(cell => cell !== "");

                if (activeCells.length === 0) return;

                const firstValue = activeCells[0];

                if (firstValue.includes("Item Particulars") || 
                    firstValue.includes("MAHARAJ") || 
                    firstValue.includes("Product List") ||
                    firstValue.includes("SHOP NO")) return;

                if (activeCells.length === 1) {
                    currentCompany = {
                        id: idCounter++,
                        company: firstValue,
                        logo: `${REPO_BASE}assets/${LOGO_MAP[firstValue] || 'placeholder.png'}`,
                        items: []
                    };
                    products.push(currentCompany);
                } 
                else if (activeCells.length >= 2 && currentCompany) {
                    const itemName = activeCells[0];
                    const packing = activeCells[1];

                    let cleanImg = itemName.replace(/[^a-zA-Z0-9]/g, '_').replace(/_+/g, '_').replace(/_$/, '');
                    let imageUrl = `${REPO_BASE}images/${cleanImg}.png`;

                    const noImgKeywords = ["GT S10", "MID NB", "MID XL", "SINGLE", "FLUF SOFT", "FLUFFY", "TAB LUKOL"];
                    if (noImgKeywords.some(key => itemName.includes(key) && !itemName.includes("LID"))) {
                        imageUrl = "";
                    }

                    currentCompany.items.push({
                        name: itemName,
                        packing: packing,
                        image: imageUrl
                    });

                    totalProducts++;
                }
            });

            document.getElementById('companyCount').innerText = products.length;
            document.getElementById('productCount').innerText = totalProducts;
            document.getElementById('output').textContent = JSON.stringify(products, null, 2);
        }

        // Updated Copy Logic with Robust Fallback
        document.getElementById('copyBtn').onclick = function() {
            const outputElement = document.getElementById('output');
            const textToCopy = outputElement.textContent;

            if (textToCopy === "JSON will appear here...") return;

            // Method 1: Modern API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    alert("JSON Copied!");
                }).catch(err => {
                    useFallbackCopy(outputElement);
                });
            } else {
                // Method 2: Fallback for restricted environments (iframes/http)
                useFallbackCopy(outputElement);
            }
        };

        function useFallbackCopy(element) {
            try {
                const range = document.createRange();
                range.selectNodeContents(element);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);

                const successful = document.execCommand('copy');
                selection.removeAllRanges(); // Clear selection

                if (successful) {
                    alert("JSON Copied! (via fallback)");
                } else {
                    throw new Error('Fallback failed');
                }
            } catch (err) {
                alert("Please select the text and press Ctrl+C to copy.");
            }
        }
    </script>
</body>
</html>
