<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maharaj Catalog JSON Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; color: #333; }
        .container { max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .upload-section { border: 2px dashed #ccc; padding: 30px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-section:hover { border-color: #007bff; background: #f8f9fa; }
        #jsonOutput { width: 100%; height: 400px; margin-top: 20px; font-family: monospace; padding: 10px; background: #272822; color: #f8f8f2; border-radius: 4px; display: none; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:disabled { background: #ccc; }
        .status { margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Maharaj Catalog Generator</h2>
    <p>Upload the <strong>Maharaj_Complete_Catalog.csv</strong> or Excel file to convert it back to the proper JSON structure.</p>

    <div class="upload-section" onclick="document.getElementById('fileInput').click()">
        <p>Click here or drag and drop your Excel/CSV file</p>
        <input type="file" id="fileInput" accept=".csv, .xlsx, .xls" style="display:none">
    </div>

    <div id="status" class="status"></div>
    <button id="copyBtn" class="btn" style="display:none" onclick="copyToClipboard()">Copy JSON to Clipboard</button>
    
    <textarea id="jsonOutput" readonly></textarea>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const jsonOutput = document.getElementById('jsonOutput');
    const copyBtn = document.getElementById('copyBtn');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Processing file...";
        const reader = new FileReader();

        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            
            // Get first sheet
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // Convert to Array of Arrays (raw data)
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            const processedJson = convertExcelToMaharajJson(rows);
            
            // Display JSON
            jsonOutput.value = JSON.stringify(processedJson, null, 2);
            jsonOutput.style.display = 'block';
            copyBtn.style.display = 'inline-block';
            status.innerText = "Success! JSON Generated.";
            status.style.color = "green";
        };

        reader.readAsArrayBuffer(file);
    });

    function convertExcelToMaharajJson(rows) {
        const result = [];
        let currentCompany = null;
        let companyId = 1;

        // Skip header row (index 0)
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;

            const name = row[0] ? String(row[0]).trim() : "";
            const packing = row[1] ? String(row[1]).trim() : "";
            const description = row[2] ? String(row[2]).trim() : "";
            const logoUrl = row[3] ? String(row[3]).trim() : "";
            const imageUrl = row[4] ? String(row[4]).trim() : "";

            // LOGIC: If Column B (Packing) is empty, it's a COMPANY row
            if (name && !packing) {
                currentCompany = {
                    id: companyId++,
                    company: name,
                    logo: logoUrl,
                    items: []
                };
                result.push(currentCompany);
            } 
            // LOGIC: If Column B has values, it's a PRODUCT row
            else if (name && packing) {
                if (currentCompany) {
                    currentCompany.items.push({
                        name: name,
                        packing: packing,
                        description: description, // Matches the 3rd column in Excel
                        image: imageUrl
                    });
                }
            }
        }
        return result;
    }

    function copyToClipboard() {
        jsonOutput.select();
        document.execCommand('copy');
        alert("JSON copied to clipboard!");
    }
</script>

</body>
</html>
